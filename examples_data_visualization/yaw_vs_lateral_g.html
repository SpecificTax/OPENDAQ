    <script>
    (function() {
        'use strict';
        
        function waitForPlotly() {
            if (typeof Plotly !== 'undefined') {
                console.log('Plotly loaded successfully!');
                init();
            } else {
                setTimeout(waitForPlotly, 100);
            }
        }
        
        function init() {
            try {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                visualizeData(window.sensorData);
            } catch (error) {
                console.error('Error initializing:', error);
                document.getElementById('loading').innerHTML = 'Error: ' + error.message;
            }
        }
        
        function visualizeData(data) {
            const accel = data.acceleration;
            const angle = data.angle;
            
            const sampleIndices = accel.map((_, i) => i);
            
            // Calculate lateral acceleration (combining X and Y)
            const lateralAccel = accel.map(d => {
                // Take the magnitude of X and Y components, convert to g's
                return Math.sqrt(d.x * d.x + d.y * d.y) / 9.81;
            });
            
            // Get yaw angles (pad to match acceleration length if needed)
            const yawAngles = angle.map(d => d.yaw);
            
            // Create dual-axis plot
            const trace1 = {
                x: sampleIndices,
                y: lateralAccel,
                name: 'Lateral Acceleration',
                type: 'scatter',
                mode: 'lines',
                line: {
                    color: '#ef4444',
                    width: 2.5
                },
                yaxis: 'y1'
            };
            
            const trace2 = {
                x: sampleIndices.slice(0, yawAngles.length),
                y: yawAngles,
                name: 'Yaw Angle (Heading)',
                type: 'scatter',
                mode: 'lines',
                line: {
                    color: '#3b82f6',
                    width: 2.5
                },
                yaxis: 'y2'
            };
            
            const layout = {
                title: {
                    text: 'When you turn (yaw changes), lateral G-forces spike!',
                    font: {size: 16, color: '#666'}
                },
                xaxis: {
                    title: 'Sample Number (Time →)',
                    titlefont: {size: 14},
                    tickfont: {size: 12}
                },
                yaxis: {
                    title: 'Lateral Acceleration (g)',
                    titlefont: {color: '#ef4444', size: 14},
                    tickfont: {color: '#ef4444', size: 12},
                    side: 'left'
                },
                yaxis2: {
                    title: 'Yaw Angle (degrees)',
                    titlefont: {color: '#3b82f6', size: 14},
                    tickfont: {color: '#3b82f6', size: 12},
                    overlaying: 'y',
                    side: 'right'
                },
                hovermode: 'x unified',
                showlegend: true,
                legend: {
                    x: 0.5,
                    y: 1.15,
                    xanchor: 'center',
                    orientation: 'h',
                    bgcolor: 'rgba(255,255,255,0.8)',
                    bordercolor: '#ccc',
                    borderwidth: 1
                },
                margin: {t: 80, l: 70, r: 70, b: 70}
            };
            
            Plotly.newPlot('mainChart', [trace1, trace2], layout, {responsive: true});
            
            generateInsights(lateralAccel, yawAngles, accel);
        }
        
        function generateInsights(lateralAccel, yawAngles, accel) {
            // Find peaks in lateral acceleration
            const maxLateralG = Math.max(...lateralAccel);
            const avgLateralG = lateralAccel.reduce((a,b) => a+b, 0) / lateralAccel.length;
            
            // Calculate yaw rate of change
            const yawChanges = [];
            for (let i = 1; i < yawAngles.length; i++) {
                let delta = yawAngles[i] - yawAngles[i-1];
                // Handle wrapping
                if (delta > 180) delta -= 360;
                if (delta < -180) delta += 360;
                yawChanges.push(Math.abs(delta));
            }
            const maxYawChange = Math.max(...yawChanges);
            const avgYawChange = yawChanges.reduce((a,b) => a+b, 0) / yawChanges.length;
            
            // Find correlation between yaw changes and lateral G
            let correlationEvents = 0;
            const threshold = 0.15; // g's
            for (let i = 1; i < Math.min(lateralAccel.length, yawChanges.length); i++) {
                if (lateralAccel[i] > threshold && yawChanges[i-1] > 2) {
                    correlationEvents++;
                }
            }
            
            const insightsHTML = `
                <h2>🔍 What This Tells You</h2>
                <p><strong>Peak lateral acceleration:</strong> <span class="highlight">${maxLateralG.toFixed(3)}g</span> during your most aggressive swerve</p>
                
                <p><strong>Average lateral G:</strong> ${avgLateralG.toFixed(3)}g - Most of your driving was smooth with occasional dynamic maneuvers</p>
                
                <p><strong>Maximum yaw change:</strong> <span class="highlight">${maxYawChange.toFixed(1)}°</span> between samples - Sharp direction changes detected!</p>
                
                <p><strong>Correlation detected:</strong> Found ${correlationEvents} events where yaw changes coincided with lateral G spikes. This shows your IMU is capturing the physics correctly - <strong>when you turn the wheel (changing yaw), the vehicle experiences lateral acceleration!</strong></p>
